# ==========================================
# Production-specific configuration
# ==========================================
spring:
  config:
    activate:
      on-profile: prod

# Security Headers
server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

# CORS - Strict in production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://resuna.app,https://www.resuna.app}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,x-client-fingerprint,x-captcha-token
  allow-credentials: true

# Logging - Menos verboso em produção
logging:
  level:
    root: INFO
    com.resuna: INFO
    org.springframework: WARN
    org.springframework.web: INFO

# Turnstile - Obrigatório em produção
turnstile:
  enabled: true
  secret-key: ${TURNSTILE_SECRET_KEY}

# Rate Limiting - Mais restritivo
rate-limit:
  enabled: true
  general:
    max-requests: 30
    window-seconds: 60
  ai:
    max-requests: 5
    window-seconds: 60
    daily-max: 20
  ats:
    max-requests: 5
    window-seconds: 60
    daily-max: 30
  export:
    max-requests: 10
    window-seconds: 300

# Credits System
credits:
  daily-limit: 10
  max-accounts-per-ip: 3
  require-email-verification: true
  reset-time: "00:00"

# OpenRouter - Production settings
openrouter:
  retry:
    enabled: true
    max-attempts: 3
